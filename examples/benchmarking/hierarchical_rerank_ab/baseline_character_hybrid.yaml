# A/B config — BASELINE  (issue #32, task 6.2)
# ---------------------------------------------------------------------------
# Baseline arm: CharacterTextSplitter chunking + HybridRetriever (the pre-#31
# default). Run this arm as its OWN deploy+ingest+evaluate pass (NOT in a `-cd`
# directory — that mode can't vary chunking/retriever per arm; see README.md):
#
#   mkdir -p bench_out/hierarchical_rerank_ab
#   archi evaluate -n hr-ab-baseline \
#     -c examples/benchmarking/hierarchical_rerank_ab/baseline_character_hybrid.yaml \
#     -e ~/.archi/.env.benchmark --hostmode
#
# Then redeploy + re-ingest with treatment_hierarchical_rerank.yaml, evaluate
# again, and compare the two runs' RAGAS aggregates offline.
#
# CONTRACT: everything below is held IDENTICAL to the treatment config EXCEPT
# the `data_manager.chunking` + `data_manager.retrievers` blocks and `name` /
# `global.DATA_PATH`. Keep embedding, SUT model, judge, and queries in lockstep
# so the only difference between the two runs is the retrieval treatment.

name: baseline-character-hybrid

global:
  TRAINED_ON: "FASRC Cannon documentation"
  # DISTINCT per arm — each config ingests its OWN vectorstore. If both arms
  # share a DATA_PATH the second ingest reuses the first's index and the A/B is
  # meaningless.
  DATA_PATH: bench_out/hierarchical_rerank_ab/_data/baseline

data_manager:
  # --- HELD FIXED across both arms ---
  sources:
    links:
      input_lists:
        # REQUIRED operator-supplied corpus (held identical across both arms).
        # config/lists/sources.list is the live FASRC KB list and is gitignored
        # (operator-local), so it is NOT present in a clean checkout. If it is
        # missing the scraper logs a warning and SKIPS it -- the benchmark then
        # runs against an EMPTY corpus and yields meaningless RAGAS scores. Stage
        # this file (or repoint at your deployment's list) BEFORE running, and
        # confirm the rendered weblists/<list> is non-empty. See README.md.
        - config/lists/sources.list
  embedding_name: HuggingFaceEmbeddings   # MUST match the treatment arm
  retrievers:
    hybrid_retriever:
      # Candidate generation is shared by BOTH retrievers, so these weights must
      # be identical in both files for a fair comparison.
      bm25_weight: 0.6
      semantic_weight: 0.4
      num_documents_to_retrieve: 5        # k returned by the baseline HybridRetriever

  # --- VARIED: baseline arm ---
  # character strategy => CharacterTextSplitter; hierarchical_rerank off =>
  # build_vector_retriever() returns HybridRetriever (factory.py).
  chunking:
    strategy: character
    chunk_size: 1000

services:
  benchmarking:
    # --- HELD FIXED across both arms ---
    agent_class: FASRCDocsAgent
    # Checked-in placeholder persona so this example validates from a clean
    # checkout. Swap to your tuned config/agents/fasrc-cannon.md for a scored run.
    agent_md_file: examples/agents/fasrc-docs.md
    # SUT = the FASRC vLLM (openai_compat). For provider:local the harness reuses
    # ollama_url as the SUT base_url. A `/v1` endpoint auto-selects the
    # openai_compat client (ChatOpenAI); set `provider_mode: ollama` to force the
    # native Ollama client for a real Ollama server (#73). Requires the FASRC VPN.
    provider: local
    model: "palmfuture/Qwen3.6-35B-A3B-GPTQ-Int4"
    ollama_url: http://archi.rc.fas.harvard.edu:8001/v1
    queries_path: examples/benchmarking/fasrc_ragas_queries.json
    # ^ typed FASRC bank, in-repo (sliceable by question type). For the headline
    #   quality delta, swap to examples/benchmarking/snow_ragas_queries_pt1.json
    #   (27 real ServiceNow tickets) — that bank is operator-local and gitignored
    #   (real ticket data), so place it on disk before running.
    out_dir: bench_out/hierarchical_rerank_ab
    modes:
      - "RAGAS"   # snow bank has no `sources`; add "SOURCES" only with a url-bearing bank
    mode_settings:
      ragas_settings:
        # RAGAS metric embeddings: HuggingFace (sentence-transformers, local) so
        # scoring needs no OPENAI_API_KEY. Omitting this renders the "OpenAI"
        # default, which fails in the benchmark env (HUIT_API_KEY + Postgres only).
        embedding_model: huggingface
        # Judge/SUT split — break self-grading bias. Independent judge = Harvard
        # HUIT Bedrock Claude, pinned (not the rolling alias) for reproducibility.
        # Needs HUIT_API_KEY in the env file.
        evaluator_provider: huit_bedrock
        evaluator_model: us.anthropic.claude-sonnet-4-5-20250929-v1:0
        timeout: 180
