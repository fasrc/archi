# Docker Compose for Open WebUI connecting to an archi deployment.
#
# Usage:
#   ARCHI_TOKEN=archi_<your-token> docker compose -f docker-compose.openwebui.yaml up -d
#
# Assumes archi is already running on the host at port 7861.

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      OPENAI_API_BASE_URL: "http://host.docker.internal:7861/v1"
      OPENAI_API_KEYS: "${ARCHI_TOKEN}"
      BYPASS_EMBEDDING_AND_RETRIEVAL: "true"
      ENABLE_FORWARD_USER_INFO_HEADERS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - open-webui-data:/app/backend/data
    restart: unless-stopped

volumes:
  open-webui-data:
