# Configuration for archi with Open WebUI frontend.
#
# This deployment uses:
# - archi as the RAG backend with OpenAI-compatible API enabled
# - Open WebUI as the chat frontend
# - vLLM or OpenAI as the LLM provider
#
# Setup:
#   1. Create deployment:
#      archi create --name my-archi-openwebui --config examples/deployments/openwebui/config.yaml --services chatbot --hostmode
#
#   2. Generate an API token (after deployment is running):
#      curl -X POST http://localhost:7861/api/users/me/api-token
#
#   3. Start Open WebUI (see docker-compose.openwebui.yaml):
#      ARCHI_TOKEN=archi_<your-token> docker compose -f docker-compose.openwebui.yaml up -d
#
# Required env vars:
#   OPENAI_API_KEY - for OpenAI provider (or configure local/vLLM provider)

name: my_archi

services:
  chat_app:
    agent_class: CMSCompOpsAgent
    agents_dir: examples/agents
    client_timeout_seconds: 1800
    default_provider: openai
    default_model: gpt-4o
    providers:
      openai:
        enabled: true
        default_model: "gpt-4o"
        models:
          - "gpt-4o"
      local:
        enabled: false
    trained_on: "My data"
    port: 7861
    external_port: 7861
    openai_compat:
      enabled: true
  vectorstore:
    backend: postgres
  data_manager:
    port: 7871
    external_port: 7871
    auth:
      enabled: false

data_manager:
  sources:
    links:
      input_lists: []
  embedding_name: HuggingFaceEmbeddings
